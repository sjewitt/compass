	<h2>Quadrant 1</h2>
<div class="panel">
	<div>Title #1</div>
	<select>
		<option value="none">[not set]</option>
		{% for title_part in quadrant_titles %}
		<option value="{{ title_part.id }}"
		{% if compass_data and title_part.id == compass_data.data_quadrants[0].title[0].id %}
			selected="selected" 
		{% endif %}
		>{{ title_part.title_part }}</option>
		{% endfor %}
	</select>

		{% endfor %}

</div>
